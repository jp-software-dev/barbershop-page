<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda | Barber Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="back-link" title="Volver al inicio">
                <i class="fas fa-arrow-left"></i>
            </a>
            
            <div class="logo">
                <span class="logo-bar">BARBER</span><span class="logo-drinks" style="color: #333;">SHOP</span>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar producto..." aria-label="Buscar productos">
                <i class="fas fa-search"></i>
            </div>

            <button class="menu-toggle" id="menuToggle" aria-label="Menú">
                <span></span><span></span><span></span>
            </button>
        </div>

        <nav class="nav-menu tienda-menu" id="navMenu">
            <ul class="nav-list">
                <li><a href="index.html"><i class="fas fa-home"></i> Inicio</a></li>
                <li><a href="tienda.html" class="active"><i class="fas fa-store"></i> Tienda</a></li>
                <li><a href="https://calendar.app.google/ysaZC8uKMBFZfemN9" target="_blank" style="color: #1a73e8; font-weight: 700;">AGENDAR CITA</a></li>
            </ul>
        </nav>
    </header>

    <a href="https://wa.me/527299635417?text=Hola%2C%20me%20gustar%C3%ADa%20obtener%20m%C3%A1s%20informaci%C3%B3n%20sobre%20sus%20productos."
       class="whatsapp-float" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-whatsapp"></i>
        <span class="whatsapp-tooltip">¡Compra por WhatsApp!</span>
    </a>

    <main class="container">
        <div class="filter-pills" role="tablist">
            <button class="pill active" data-filter="todo" onclick="renderProductos('todo')">TODO</button>
            <button class="pill" data-filter="grooming" onclick="renderProductos('grooming')">PRODUCTOS</button>
            <button class="pill" data-filter="perfumes" onclick="renderProductos('perfumes')">PERFUMES</button>
            <button class="pill" data-filter="ropa" onclick="renderProductos('ropa')">ROPA</button>
        </div>
        <div id="productGrid" class="product-grid"></div>
    </main>

    <div id="productModal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-overlay"></div>
        <div class="modal-container">
            <button class="modal-close" id="closeModalBtn"><i class="fas fa-times"></i></button>
            <div class="modal-image-area" id="modalImageArea"></div>
            <div class="modal-details">
                <h2 id="modalTitle"></h2>
                <div class="modal-price" id="modalPrice"></div>
                <div class="stock-indicator" id="stockIndicator">
                    <span class="stock-badge" id="stockBadge"></span>
                    <span class="stock-text" id="stockText"></span>
                </div>
                <div id="talla-section" class="talla-container" style="display: none;">
                    <span class="talla-label"><i class="fas fa-ruler"></i> SELECCIONA TU TALLA:</span>
                    <div class="talla-grid" id="talla-botones"></div>
                </div>
                <div class="modal-description">
                    <h4>Detalles</h4>
                    <ul id="modalFeatures"></ul>
                </div>
                <button class="btn-whatsapp-product" id="btnWhatsappModal">
                    <i class="fab fa-whatsapp"></i> <span>COTIZAR POR WHATSAPP</span>
                </button>
            </div>
        </div>
    </div>

    <div id="imageViewer" class="image-viewer">
        <button class="image-viewer-close" id="imageViewerClose"><i class="fas fa-times"></i></button>
        <button class="image-viewer-nav prev" id="viewerPrevBtn"><i class="fas fa-chevron-left"></i></button>
        <div class="image-viewer-container">
            <div id="imageViewerCounter" class="image-viewer-counter"></div>
        </div>
        <button class="image-viewer-nav next" id="viewerNextBtn"><i class="fas fa-chevron-right"></i></button>
    </div>

    <footer class="footer-final">
        <div class="container">
            <p>© 2026 Barber Shop. Todos los derechos reservados.</p>
            </div>
    </footer>

    <script src="js/productos.js"></script>
    <script src="js/lightbox.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        document.addEventListener('keydown', function(event) {
            if (event.ctrlKey && event.shiftKey && event.key === 'L') {
                window.location.href = 'admin-login.html';
            }
        });
    </script>
</body>
</html>
